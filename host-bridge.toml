# host-bridge-mcp default configuration
#
# Override this file location by setting:
#   HOST_BRIDGE_CONFIG=/path/to/host-bridge.toml

[server]
# HTTP bind address for the server.
bind_address = "0.0.0.0:8787"

[logging]
# Number of most recent log lines kept hot in memory for fast TUI reads.
memory_buffer_lines = 2000

# Optional on-disk log file path.
# When omitted and persist_file = false, the server uses a temporary file and deletes it on exit.
# When omitted and persist_file = true, the server writes to ./host-bridge-mcp.log.
# file_path = "./host-bridge-mcp.log"

# Keep the log file after process exit.
persist_file = false

[execution]
# Default action when command has no explicit policy.
# allow   = run directly
# confirm = require user confirmation from the TUI operator
# deny    = reject
default_action = "confirm"

# Default timeout for each command (milliseconds).
default_timeout_ms = 1800000

# Hard cap for timeoutMs passed from tool calls.
max_timeout_ms = 7200000

# Enable built-in /mnt/<drive>/... -> <DRIVE>:\... mapping for Windows targets.
enable_builtin_wsl_mapping = true

# Optional global default working directory.
# default_working_directory = "/workspace"

# Ordered execution rules.
# Each rule matches one command and an optional argument prefix.

[[execution.rules]]
command = "java"
action = "confirm"

[[execution.rules]]
command = "mvn"
action = "allow"

[[execution.rules]]
command = "mvn"
args_prefix = ["clean", "compile"]
action = "confirm"

[[execution.rules]]
command = "mvn"
args_prefix = ["deploy"]
action = "deny"

[[execution.rules]]
command = "gradle"
action = "allow"

[[execution.rules]]
command = "npm"
action = "allow"

[[execution.rules]]
command = "npm"
args_prefix = ["publish"]
action = "confirm"

[[execution.rules]]
command = "pnpm"
action = "allow"

[[execution.rules]]
command = "cargo"
action = "allow"

[[execution.rules]]
command = "cargo"
args_prefix = ["publish"]
action = "confirm"

[[execution.rules]]
command = "rustc"
action = "allow"

# Path mapping is platform-agnostic.
# You can map container paths, WSL paths, remote mount paths, etc.
# Rules are prefix-based and applied in order.

# Example: container path -> host path
[[execution.path_mappings]]
from = "/workspace/mnt/d"
to = "D:\\"
platforms = ["windows", "wsl"]

# Example: generic container -> host mapping (no platform restriction)
[[execution.path_mappings]]
from = "/app/workspace"
to = "/Users/Shared/workspace"

# Example: Linux container path -> macOS host path
[[execution.path_mappings]]
from = "/src"
to = "/Users/dev/src"
platforms = ["macos"]
